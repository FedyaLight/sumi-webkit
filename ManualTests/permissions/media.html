<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sumi Media Permission Manual Test</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.4;
    }

    body {
      margin: 24px;
      max-width: 760px;
    }

    button {
      margin: 0 8px 8px 0;
      padding: 8px 12px;
    }

    video {
      display: block;
      width: min(100%, 560px);
      min-height: 240px;
      margin-top: 12px;
      background: #111;
    }

    pre {
      white-space: pre-wrap;
      padding: 12px;
      background: color-mix(in srgb, CanvasText 8%, Canvas);
      border: 1px solid color-mix(in srgb, CanvasText 20%, Canvas);
    }
  </style>
</head>
<body>
  <h1>Media Permission Manual Test</h1>
  <p>Until Sumi prompt UI exists, first-time ask/no-decision requests are expected to fail closed.</p>

  <div>
    <button id="camera">Request camera</button>
    <button id="microphone">Request microphone</button>
    <button id="both">Request camera + microphone</button>
    <button id="stop">Stop tracks</button>
  </div>

  <video id="preview" autoplay muted playsinline></video>
  <pre id="result">Idle</pre>

  <script>
    const preview = document.getElementById("preview");
    const result = document.getElementById("result");
    let stream = null;

    function describeStream(nextStream) {
      return nextStream.getTracks()
        .map((track) => `${track.kind}: ${track.label || "(no label)"} [${track.readyState}]`)
        .join("\n");
    }

    async function requestMedia(constraints) {
      stopTracks();
      result.textContent = `Requesting ${JSON.stringify(constraints)}`;
      try {
        stream = await navigator.mediaDevices.getUserMedia(constraints);
        preview.srcObject = stream;
        result.textContent = `Success\n${describeStream(stream)}`;
      } catch (error) {
        result.textContent = `Error: ${error.name}\n${error.message}`;
      }
    }

    function stopTracks() {
      if (!stream) return;
      for (const track of stream.getTracks()) {
        track.stop();
      }
      stream = null;
      preview.srcObject = null;
      result.textContent = "Stopped";
    }

    document.getElementById("camera").addEventListener("click", () => requestMedia({ video: true }));
    document.getElementById("microphone").addEventListener("click", () => requestMedia({ audio: true }));
    document.getElementById("both").addEventListener("click", () => requestMedia({ video: true, audio: true }));
    document.getElementById("stop").addEventListener("click", stopTracks);
  </script>
</body>
</html>
