name: Build Adblock Bundle

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read

jobs:
  build-adblock-bundle:
    name: Build native rule bundles
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show tool versions
        run: |
          python3 --version
          cargo --version

      - name: Build bundles
        run: |
          scripts/build_sumi_adblock_bundle.sh \
            --all-profiles \
            --output .build/sumi-adblock-bundles

      - name: Verify bundles
        run: |
          for bundle in .build/sumi-adblock-bundles/*/SumiAdblockBundle; do
            scripts/verify_sumi_adblock_bundle.sh "$bundle"
          done

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: sumi-adblock-bundles
          path: .build/sumi-adblock-bundles
          if-no-files-found: error
          retention-days: 30
