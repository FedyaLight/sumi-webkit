name: Periphery unused code

on:
  pull_request:
    paths:
      - "Sumi/**/*.swift"
      - "App/**/*.swift"
      - "Onboarding/**/*.swift"
      - "Sumi.xcodeproj/**"
  workflow_dispatch:

jobs:
  periphery:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Periphery
        run: brew install peripheryapp/periphery/periphery

      - name: Scan Sumi target
        run: |
          set -euo pipefail
          periphery scan \
            --project Sumi.xcodeproj \
            --schemes Sumi \
            --targets Sumi \
            --disable-update-check
