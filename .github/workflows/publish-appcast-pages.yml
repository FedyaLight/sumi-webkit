name: Publish Appcasts to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - docs/appcast-alpha.xml
      - docs/appcast.xml
      - .github/workflows/publish-appcast-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    name: Publish static appcasts
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Stage appcast files
        run: |
          set -euo pipefail
          mkdir -p _site
          cp docs/appcast-alpha.xml _site/appcast-alpha.xml
          cp docs/appcast.xml _site/appcast.xml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
