<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bitwarden Shadow Login</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(160deg, #0f172a, #1e293b 55%, #334155);
      font-family: "SF Pro Text", "Helvetica Neue", sans-serif;
    }
  </style>
</head>
<body>
  <shadow-login></shadow-login>
  <script>
    customElements.define('shadow-login', class extends HTMLElement {
      constructor() {
        super();
        const root = this.attachShadow({ mode: 'open' });
        root.innerHTML = `
          <style>
            .card {
              width: min(420px, calc(100vw - 48px));
              padding: 32px;
              border-radius: 24px;
              background: rgba(255, 255, 255, 0.94);
              box-shadow: 0 24px 60px rgba(15, 23, 42, 0.24);
            }
            h1 {
              margin: 0 0 8px;
              font-size: 30px;
              color: #020617;
            }
            p {
              margin: 0 0 24px;
              color: #475569;
            }
            label {
              display: grid;
              gap: 8px;
              margin: 0 0 16px;
              font-weight: 600;
              color: #0f172a;
            }
            input {
              height: 48px;
              padding: 0 14px;
              border-radius: 14px;
              border: 1px solid #cbd5e1;
              background: white;
              font-size: 16px;
            }
            input:focus {
              outline: 2px solid #2563eb;
              outline-offset: 2px;
            }
            button {
              width: 100%;
              height: 48px;
              border: 0;
              border-radius: 14px;
              font-size: 16px;
              font-weight: 700;
              color: white;
              background: linear-gradient(135deg, #ec4899, #db2777);
            }
          </style>
          <main class="card">
            <h1>Shadow Login</h1>
            <p>Use this page to verify Bitwarden inline suggestions inside shadow DOM.</p>
            <label>
              Email
              <input id="username" name="username" type="email" autocomplete="username" autofocus>
            </label>
            <label>
              Password
              <input id="password" name="password" type="password" autocomplete="current-password">
            </label>
            <button type="button">Continue</button>
          </main>
        `;
      }
    });
  </script>
</body>
</html>
