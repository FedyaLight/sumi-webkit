<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bitwarden Basic Login</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "SF Pro Text", "Helvetica Neue", sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, #dbeafe 0%, transparent 35%),
        radial-gradient(circle at bottom right, #fde68a 0%, transparent 30%),
        #f8fafc;
    }
    .card {
      width: min(420px, calc(100vw - 48px));
      padding: 32px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.14);
      backdrop-filter: blur(18px);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }
    p {
      margin: 0 0 24px;
      color: #475569;
    }
    label {
      display: grid;
      gap: 8px;
      margin: 0 0 16px;
      font-weight: 600;
      color: #0f172a;
    }
    input {
      height: 48px;
      padding: 0 14px;
      border-radius: 14px;
      border: 1px solid #cbd5e1;
      background: white;
      font-size: 16px;
    }
    input:focus {
      outline: 2px solid #2563eb;
      outline-offset: 2px;
    }
    button {
      width: 100%;
      height: 48px;
      border: 0;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Basic Login</h1>
    <p>Use this page to verify Bitwarden inline suggestions on a plain form.</p>
    <form>
      <label>
        Email
        <input id="username" name="username" type="email" autocomplete="username" autofocus>
      </label>
      <label>
        Password
        <input id="password" name="password" type="password" autocomplete="current-password">
      </label>
      <button type="button">Sign In</button>
    </form>
  </main>
  <script>
    (() => {
      const params = new URLSearchParams(window.location.search);
      const target = params.get("focus");
      if (!target) return;

      const field = document.getElementById(target);
      if (!(field instanceof HTMLInputElement || field instanceof HTMLTextAreaElement)) return;

      const focusField = () => {
        try {
          field.focus({ preventScroll: true });
        } catch (_) {
          field.focus();
        }

        try {
          field.dispatchEvent(new FocusEvent("focusin", {
            bubbles: true,
            composed: true,
            relatedTarget: null
          }));
        } catch (_) {
          field.dispatchEvent(new Event("focusin", {
            bubbles: true,
            composed: true
          }));
        }
      };

      window.addEventListener("load", () => {
        setTimeout(focusField, 700);
      }, { once: true });
    })();
  </script>
</body>
</html>
