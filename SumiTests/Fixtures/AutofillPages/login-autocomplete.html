<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sumi Autofill — Autocomplete Login</title>
</head>
<body>
  <h1>Autocomplete login</h1>
  <form id="login" action="/login" method="post" autocomplete="on">
    <label>
      Email
      <input id="email" name="email" type="email" autocomplete="username email">
    </label>
    <label>
      Password
      <input id="password" name="password" type="password" autocomplete="current-password">
    </label>
    <label>
      One-time code
      <input id="otp" name="otp" type="text" inputmode="numeric" autocomplete="one-time-code">
    </label>
    <button type="submit">Sign in</button>
  </form>
  <script src="shared/fill-probe.js"></script>
</body>
</html>
